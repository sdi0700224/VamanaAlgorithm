name: Build and Test

on:
  push:  # Trigger on pushes to any branch
    branches:
      - '**'
  pull_request:  # Trigger on pull requests targeting master
    branches:
      - master

jobs:
  build_job:
    runs-on: ubuntu-latest

    steps:
      # Checkout the repository and initialize submodules
      - name: Checkout Repository
        uses: actions/checkout@v3
        with:
          submodules: recursive

      # Debug: Verify repository structure
      - name: Debug Repository Structure
        run: |
          echo "Repository structure:"
          ls -R

      # Install required dependencies
      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc g++ cmake make valgrind

      # Build the project
      - name: Build Project
        run: |
          make clean || true
          make all

      # Debug: Verify build outputs
      - name: Debug Build Outputs
        run: |
          echo "Build outputs:"
          ls -R

      # Run the tests
      - name: Run Tests
        run: |
          make test

      # Memory Check with Valgrind
      - name: Memory Check with Valgrind
        if: always()
        run: |
          echo "Checking test binary:"
          ls -l ./bin/
          if [ -f "./bin/tests" ]; then
            valgrind --leak-check=full ./bin/tests
          else
            echo "Error: Test binary ./bin/tests not found."
            exit 1
          fi
